services:
  - type: web
    name: crud-jugadores-entrenadores
    env: java
    plan: free
    buildCommand: cd db && ./mvnw clean package -DskipTests
    startCommand: cd db && java -jar target/*.jar
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_JPA_SHOW_SQL
        value: "false"

