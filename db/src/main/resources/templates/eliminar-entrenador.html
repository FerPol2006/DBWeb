<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Entrenador</title>
</head>
<body>
<h1>Eliminar Entrenador</h1>
<p>¿Deseas eliminar a <span th:text="${entrenador.nombre}"></span>?</p>
<p>Experiencia: <span th:text="${entrenador.experiencia}"></span></p>
<p>Edad: <span th:text="${entrenador.edad}"></span></p>
<form th:action="@{/entrenadores/eliminar/{id}(id=${entrenador.id})}" method="post">
    <button type="submit">Eliminar</button>
</form>
<a th:href="@{/entrenadores}">Cancelar</a>
</body>
</html>
