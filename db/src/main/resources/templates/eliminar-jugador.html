<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Jugador</title>
</head>
<body>
<h1>Eliminar Jugador</h1>
<p>¿Deseas eliminar a <span th:text="${jugador.nombre}"></span>?</p>
<p>Posicion: <span th:text="${jugador.posicion}"></span></p>
<p>Numero: <span th:text="${jugador.numero}"></span></p>
<form th:action="@{/jugadores/eliminar/{id}(id=${jugador.id})}" method="post">
    <button type="submit">Eliminar</button>
</form>
<a th:href="@{/jugadores}">Cancelar</a>
</body>
</html>
